kind = "web"
previewPath = "/"
title = "DentAI"
version = "1.0.0"
id = "artifacts/dentai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18744
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dentai run dev"

[services.env]
PORT = "18744"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dentai", "run", "build"]
publicDir = "artifacts/dentai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
